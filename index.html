<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Client HTTP</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 800px; }
        .url-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .url-row select { width: 100px; }
        .url-row input { flex: 1; }
        .header-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .header-row input { flex: 1; }
        .header-row button { width: 30px; height: 30px; }
        textarea { width: 100%; height: 100px; margin-bottom: 20px; }
        hr { margin: 20px 0; border: 1px solid #ccc; }
        .response-item { margin-bottom: 15px; }
        .response-label { font-weight: bold; margin-bottom: 5px; }
        .response-content { background: #f5f5f5; padding: 10px; border: 1px solid #ddd; white-space: pre-wrap; font-family: monospace; }
        button[type="submit"] { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button[type="submit"]:hover { background: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Client HTTP</h1>
    <div class="url-row">
        <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
        </select>
        <input type="text" id="url" placeholder="https://jsonplaceholder.typicode.com/posts/1" value="https://jsonplaceholder.typicode.com/posts/1">
    </div>
    <div id="headers-container">
        <div class="header-row">
            <input type="text" placeholder="Header Key" class="header-key">
            <input type="text" placeholder="Header Value" class="header-value">
            <button type="button" onclick="addHeader()">+</button>
        </div>
    </div>
    <textarea id="body" placeholder='{"title": "Test", "body": "Contenu du test", "userId": 1}'></textarea>
    <button type="submit" onclick="sendRequest()">Envoyer</button>
    <hr>
    <div id="responseSection" style="display: none;">
        <div class="response-item">
            <div class="response-label">Status:</div>
            <div id="statusText" class="response-content"></div>
        </div>
        <div class="response-item">
            <div class="response-label">Headers:</div>
            <div id="headers-response" class="response-content"></div>
        </div>
        <div class="response-item">
            <div class="response-label">Body:</div>
            <div id="body-response" class="response-content"></div>
        </div>
    </div>
    <div id="errorMessage" class="error" style="display: none;"></div>
    <script>
        function addHeader() {
            const container = document.getElementById('headers-container');
            const headerRow = document.createElement('div');
            headerRow.className = 'header-row';
            headerRow.innerHTML = '<input type="text" placeholder="Header Key" class="header-key"><input type="text" placeholder="Header Value" class="header-value"><button type="button" onclick="removeHeader(this)">-</button>';
            container.appendChild(headerRow);
        }
        function removeHeader(button) { button.parentElement.remove(); }
        async function sendRequest() {
            const url = document.getElementById('url').value.trim();
            const method = document.getElementById('method').value;
            const bodyInput = document.getElementById('body').value.trim();
            if (!url) { showError('Veuillez entrer une URL'); return; }
            try { new URL(url); } catch (e) { showError('URL invalide'); return; }
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('responseSection').style.display = 'none';
            try {
                const options = { method: method };
                const headerKeys = document.querySelectorAll('.header-key');
                const headerValues = document.querySelectorAll('.header-value');
                const headers = {};
                for (let i = 0; i < headerKeys.length; i++) {
                    const key = headerKeys[i].value.trim();
                    const value = headerValues[i].value.trim();
                    if (key && value) { headers[key] = value; }
                }
                if (Object.keys(headers).length > 0) { options.headers = headers; }
                if (method !== 'GET' && method !== 'DELETE' && bodyInput) {
                    try {
                        JSON.parse(bodyInput);
                        options.body = bodyInput;
                        if (!options.headers) options.headers = {};
                        if (!options.headers['Content-Type']) { options.headers['Content-Type'] = 'application/json'; }
                    } catch (e) { throw new Error('JSON invalide pour le body'); }
                }
                const response = await fetch(url, options);
                const responseHeaders = {};
                response.headers.forEach((value, key) => { responseHeaders[key] = value; });
                let bodyText = '';
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    bodyText = JSON.stringify(await response.json(), null, 2);
                } else { bodyText = await response.text(); }
                displayResponse(response.status, response.statusText, responseHeaders, bodyText);
            } catch (error) { showError('Erreur: ' + error.message); }
        }
        function displayResponse(status, statusText, headers, body) {
            document.getElementById('statusText').textContent = status + ' ' + statusText;
            document.getElementById('headers-response').textContent = JSON.stringify(headers, null, 2) || 'Aucun header';
            document.getElementById('body-response').textContent = body || 'Corps vide';
            document.getElementById('responseSection').style.display = 'block';
        }
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            document.getElementById('responseSection').style.display = 'none';
        }
    </script>
</body>
</html>
